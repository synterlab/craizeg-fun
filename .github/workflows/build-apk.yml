name: Build & Release Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: pnpm run build

      - name: Install Capacitor CLI & Android
        run: pnpm add -D @capacitor/cli@^6 && pnpm add @capacitor/core@^6 @capacitor/android@^6

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk craizeg.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: craizeg-apk
          path: craizeg.apk
          retention-days: 90

      - name: Delete old release
        run: |
          gh release delete latest-build --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Craizeg — Latest Build"
          body: |
            ## Craizeg Android APK

            Auto-built from the latest `main` branch.

            ### Install
            1. Download `craizeg.apk` below
            2. On Android: Settings → Security → Enable **Unknown sources**
            3. Open the downloaded APK and tap **Install**
            4. Launch Craizeg — no account needed

            > Requires Android 7.0 (API 24) or higher · ~15 MB
          files: craizeg.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

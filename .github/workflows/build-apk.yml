name: Build & Release Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install dependencies (npm)
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Install Capacitor (post-build)
        run: npm install @capacitor/core@^6 @capacitor/android@^6 @capacitor/cli@^6 --legacy-peer-deps

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk craizeg.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: craizeg-apk
          path: craizeg.apk
          retention-days: 90

      - name: Delete old release
        run: gh release delete latest-build --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Craizeg — Latest Build"
          body: |
            ## Craizeg Android APK

            Auto-built from the latest `main` branch.

            ### How to install
            1. Download **craizeg.apk** below
            2. On Android: go to **Settings → Security → Enable Unknown sources**
            3. Open the downloaded APK and tap **Install**
            4. Launch Craizeg — no account needed

            > Requires Android 7.0 (API 24) or higher · ~15 MB
          files: craizeg.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

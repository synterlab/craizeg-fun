name: Build & Release Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Install Capacitor
        run: npm install @capacitor/core@^6 @capacitor/android@^6 @capacitor/cli@^6 --legacy-peer-deps

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Craizeg app icon
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null || true
          convert -size 1024x1024 gradient:'#f97316-#ea580c' \
            -font DejaVu-Sans-Bold -pointsize 660 \
            -fill white -gravity center -annotate 0 'C' \
            /tmp/icon.png
          for entry in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            dir="${entry%%:*}"
            size="${entry##*:}"
            dest="android/app/src/main/res/$dir"
            convert /tmp/icon.png -resize "${size}x${size}" "$dest/ic_launcher.png"
            convert /tmp/icon.png -resize "${size}x${size}" "$dest/ic_launcher_round.png"
            [ -f "$dest/ic_launcher_foreground.png" ] && \
              convert /tmp/icon.png -resize "${size}x${size}" "$dest/ic_launcher_foreground.png" || true
          done
          echo "Icons generated"

      - name: Generate splash screen
        run: |
          convert -size 1080x1920 xc:'#080808' \
            /tmp/icon.png -resize 320x320 -gravity center -composite \
            /tmp/splash.png
          mkdir -p android/app/src/main/res/drawable
          cp /tmp/splash.png android/app/src/main/res/drawable/splash.png
          echo "Splash generated"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk craizeg.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: craizeg-apk
          path: craizeg.apk
          retention-days: 90

      - name: Delete old release
        run: gh release delete latest-build --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Craizeg - Latest Build"
          body: |
            ## Craizeg Android APK

            Auto-built from the latest `main` branch.

            ### How to install
            1. Download **craizeg.apk** below
            2. On Android: Settings > Security > Enable Unknown sources
            3. Open the downloaded APK and tap Install
            4. Launch Craizeg, no account needed

            > Requires Android 7.0 (API 24) or higher, approx 15 MB
          files: craizeg.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

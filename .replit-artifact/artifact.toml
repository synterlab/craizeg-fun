kind = "web"
previewPath = "/"
title = "Craizeg.fun"
version = "1.0.0"
id = "artifacts/craizeg"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20937

[services.development]
run = "pnpm --filter @workspace/craizeg run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/craizeg", "run", "build" ]
publicDir = "artifacts/craizeg/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20937"
BASE_PATH = "/"
